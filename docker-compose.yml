services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: rafa
      MINIO_ROOT_PASSWORD: orion2026
    command: server /data --console-address ":9001"

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rafa
      POSTGRES_PASSWORD: orion2026
      POSTGRES_DB: orion

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  app:
    build: .
    container_name: app
    depends_on:
      - minio
      - postgres
      - qdrant
    ports:
      - "8000:8000"
    environment:
      MINIO_HOST: minio:9000
      MINIO_KEY: rafa
      MINIO_SECRET: orion2026
      MINIO_BUCKET: dados-brutos
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: rafa
      POSTGRES_PASSWORD: orion2026
      POSTGRES_DB: orion
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - /home/rafa/.cache/huggingface:/root/.cache/huggingface

volumes:
  minio-data:
  postgres-data:
  qdrant-data: